<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrevorWX Alert Popup</title>
  <link rel="stylesheet" href="alert-popup.css">
</head>
<body>
  <div id="alertPopup" class="alert-popup hidden">
    <div class="alert-stripe"></div>

    <div class="alert-icon" id="alertIcon">⚠</div>

    <div class="alert-content">
      <div class="alert-kicker">TREVORWX LIVE ALERT</div>
      <div class="alert-type" id="alertType">SEVERE WEATHER ALERT</div>
      <div class="alert-location" id="alertLocation">MONITORING NATIONWIDE</div>
    </div>

    <div class="alert-live">
      <span></span>
      ACTIVE
    </div>
  </div>

  <script src="alert-popup.js"></script>
</body>
</html>
